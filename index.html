<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>HMAX Web Player Básico</title>
<script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
<style>
*{box-sizing:border-box}body{margin:0;font-family:Arial,Helvetica,sans-serif;background:#071407;color:#fff}.app{max-width:520px;margin:0 auto;min-height:100vh;background:linear-gradient(180deg,#082a0c,#030503)}header{padding:22px 18px;background:linear-gradient(135deg,#07991e,#ffe600);color:#071407}h1{margin:0;font-size:26px;font-weight:900}.sub{font-size:13px;margin-top:5px;font-weight:700}.box{padding:16px}.card{background:#111;border:1px solid #244b25;border-radius:18px;padding:14px;margin-bottom:14px;box-shadow:0 12px 35px rgba(0,0,0,.35)}textarea,input{width:100%;border:1px solid #2b6b2c;border-radius:14px;background:#050505;color:#fff;padding:13px;font-size:14px;outline:none}textarea{height:96px;resize:none}button{width:100%;border:0;border-radius:15px;padding:14px;font-size:15px;font-weight:900;background:#ffe600;color:#081008;margin-top:10px;cursor:pointer}.btn2{background:#14b833;color:white}.btn3{background:#222;color:#ffe600;border:1px solid #ffe600}.row{display:flex;gap:8px}.row button{flex:1}.status{font-size:13px;color:#c8ffc8;margin-top:10px}.search{margin:12px 0}.grid{display:grid;grid-template-columns:1fr;gap:10px}.item{background:#101510;border:1px solid #254225;border-radius:14px;padding:12px;display:flex;align-items:center;gap:10px}.logo{width:42px;height:42px;border-radius:10px;background:#222;object-fit:cover}.name{font-size:14px;font-weight:800;line-height:1.25}.cat{font-size:11px;color:#b9ffb9;margin-top:4px}.play{margin-left:auto;background:#13b82e;color:white;border-radius:10px;border:0;padding:9px 12px;font-weight:900;width:auto}.player{position:sticky;top:0;z-index:5;background:#000;padding:10px;border-bottom:1px solid #1f3d1f}video{width:100%;border-radius:14px;background:#000;max-height:280px}.hide{display:none}.small{font-size:12px;color:#bbb;margin-top:8px}.pill{display:inline-block;background:#183d18;color:#b7ffb7;padding:6px 9px;border-radius:999px;font-size:12px;margin:3px}.warning{background:#2b1700;border-color:#ffb300;color:#ffd98a}.loading{font-size:13px;color:#ffe600}</style>
</head>
<body>
<div class="app">
<header><h1>HMAX Web Player</h1><div class="sub">Cole sua playlist M3U e assista pelo navegador</div></header>
<div id="playerBox" class="player hide">
<video id="video" controls playsinline></video>
<div id="now" class="status"></div>
<div class="row"><button class="btn3" onclick="openExternal()">Abrir externo</button><button class="btn3" onclick="copyCurrent()">Copiar link</button></div>
</div>
<div class="box">
<div class="card">
<textarea id="playlistUrl" placeholder="Cole aqui o link M3U / HLS...">http://mtxmegga.shop/get.php?username=76719362&password=19987996&type=m3u_plus&output=hls</textarea>
<button onclick="loadPlaylist()">CARREGAR PLAYLIST</button>
<div class="row"><button class="btn2" onclick="loadDemo()">Usar exemplo HLS</button><button class="btn3" onclick="clearAll()">Limpar</button></div>
<div id="status" class="status">Dica: se algum canal HTTP não abrir no site, use “Abrir externo”.</div>
</div>
<div class="card warning"><b>Plano B automático:</b><div class="small">Player interno tenta abrir HLS/HTTPS. Se navegador bloquear HTTP, aparece opção para abrir fora.</div></div>
<div id="tools" class="card hide">
<input id="search" class="search" placeholder="Buscar canal, filme ou série..." oninput="renderList(true)" />
<div id="cats"></div>
<div class="small"><span id="count">0</span> itens carregados</div>
</div>
<div id="list" class="grid"></div>
<button id="moreBtn" class="hide" onclick="renderMore()">Carregar mais</button>
</div>
</div>
<script>
let allItems=[], shown=0, page=40, currentUrl='', currentName='', activeCat='Todos';
const defaultUrl='http://mtxmegga.shop/get.php?username=76719362&password=19987996&type=m3u_plus&output=hls';
function setStatus(t){document.getElementById('status').innerHTML=t}
function loadDemo(){document.getElementById('playlistUrl').value=defaultUrl;loadPlaylist()}
function clearAll(){localStorage.removeItem('hmax_playlist');location.reload()}
async function loadPlaylist(){
 const url=document.getElementById('playlistUrl').value.trim(); if(!url)return setStatus('Cole um link M3U primeiro.');
 localStorage.setItem('hmax_playlist',url); setStatus('<span class="loading">Carregando playlist...</span>');
 try{
   let text='';
   try{ const r=await fetch(url); text=await r.text(); }
   catch(e){ throw new Error('O navegador bloqueou a playlist HTTP/CORS. Abra esse HTML em servidor local ou use lista HTTPS.'); }
   allItems=parseM3U(text); shown=0; activeCat='Todos';
   if(!allItems.length) throw new Error('Nenhum item encontrado na playlist.');
   document.getElementById('tools').classList.remove('hide'); buildCats(); renderList(true); setStatus('Playlist carregada.');
 }catch(e){setStatus('Erro: '+e.message)}
}
function parseM3U(text){
 const lines=text.split(/\r?\n/); const arr=[]; let meta=null;
 for(const l0 of lines){ const l=l0.trim(); if(!l)continue;
   if(l.startsWith('#EXTINF')){ meta={name:(l.split(',').pop()||'Sem nome').trim(),logo:'',group:'Outros'};
     const logo=l.match(/tvg-logo="([^"]*)"/); if(logo)meta.logo=logo[1];
     const group=l.match(/group-title="([^"]*)"/); if(group)meta.group=group[1]||'Outros';
   } else if(!l.startsWith('#') && meta){ meta.url=l; arr.push(meta); meta=null; }
 }
 return arr;
}
function buildCats(){
 const cats=['Todos',...Array.from(new Set(allItems.map(i=>i.group))).slice(0,24)];
 document.getElementById('cats').innerHTML=cats.map(c=>`<span class="pill" onclick="activeCat='${c.replace(/'/g,'')}';renderList(true)">${c}</span>`).join('');
}
function filtered(){
 const q=document.getElementById('search').value.toLowerCase();
 return allItems.filter(i=>(activeCat==='Todos'||i.group===activeCat)&&(!q||i.name.toLowerCase().includes(q)||i.group.toLowerCase().includes(q)));
}
function renderList(reset=false){ if(reset){shown=0;document.getElementById('list').innerHTML=''} renderMore(); }
function renderMore(){
 const f=filtered(); const next=f.slice(shown,shown+page); shown+=next.length;
 document.getElementById('count').textContent=f.length;
 document.getElementById('list').insertAdjacentHTML('beforeend',next.map((i,idx)=>`<div class="item"><img class="logo" src="${i.logo||''}" onerror="this.style.display='none'"><div><div class="name">${escapeHtml(i.name)}</div><div class="cat">${escapeHtml(i.group)}</div></div><button class="play" onclick="playItem(${allItems.indexOf(i)})">▶</button></div>`).join(''));
 document.getElementById('moreBtn').classList.toggle('hide',shown>=f.length);
}
function playItem(idx){
 const item=allItems[idx]; currentUrl=item.url; currentName=item.name;
 document.getElementById('playerBox').classList.remove('hide'); document.getElementById('now').textContent='Reproduzindo: '+item.name;
 const video=document.getElementById('video'); if(window.hls){window.hls.destroy();window.hls=null} video.src='';
 if(location.protocol==='https:' && currentUrl.startsWith('http://')){document.getElementById('now').innerHTML='Stream HTTP bloqueado no HTTPS. Use Abrir externo.';return}
 if(currentUrl.includes('.m3u8') && Hls.isSupported()){window.hls=new Hls();window.hls.loadSource(currentUrl);window.hls.attachMedia(video);window.hls.on(Hls.Events.MANIFEST_PARSED,()=>video.play().catch(()=>{}));}
 else{video.src=currentUrl;video.play().catch(()=>{document.getElementById('now').innerHTML='Não abriu interno. Use Abrir externo.'})}
}
function openExternal(){ if(currentUrl) window.open(currentUrl,'_blank'); }
function copyCurrent(){ if(currentUrl) navigator.clipboard.writeText(currentUrl); }
function escapeHtml(s){return String(s).replace(/[&<>'"]/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;',"'":'&#39;','"':'&quot;'}[m]))}
window.addEventListener('load',()=>{const saved=localStorage.getItem('hmax_playlist'); if(saved)document.getElementById('playlistUrl').value=saved;});
</script>
</body>
</html>
